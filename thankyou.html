<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | Hurunguu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
    }

    .card {
      background: #ffffff;
      color: #333;
      padding: 40px 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease-in-out;
    }

    .card h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #2c5364;
    }

    .card p {
      margin-bottom: 25px;
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #2c5364;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s ease;
      font-weight: bold;
    }

    .btn:hover {
      background: #1b3642;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>✅ Message Sent!</h1>
    <p>
      Thank you for contacting Hurunguu.  
      We have received your message and will respond shortly.
    </p>

    <a href="index.html" class="btn">⬅ Back to Home</a>
  </div>
</body>
</html>
